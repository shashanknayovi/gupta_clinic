<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Login - Gupta Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center"><h4>Staff Login</h4></div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label>Username</label>
                                <input type="text" id="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();

            if (result.success) {
                alert("Login Successful! Redirecting...");
                
                // --- UPDATE: Doctor ID store karein ---
                if (result.doctor_id) {
                    localStorage.setItem("doctor_id", result.doctor_id);
                    localStorage.setItem("doctor_name", result.staff_name);
                } else {
                    // Agar doctor login hua par ID nahi mili, toh purani ID hata dein
                    localStorage.removeItem("doctor_id");
                }
                // --------------------------------------

                const role = result.role.trim();

                if (role === 'Admin') {
                    window.location.href = '/admin.html';
                } else if (role === 'Doctor') {
                    window.location.href = '/doctor-opd.html';
                } else if (role === 'Registration') {
                    window.location.href = '/registration.html';
                } else if (role === 'Pharmacy') {
                    window.location.href = '/pharmacy.html';
                } else if (role === 'Billing') {
                    window.location.href = '/billing.html';
                } else if (role === 'Nursing') { 
                    window.location.href = '/vitals-entry.html';
                } else if (role === 'Medical Officer') {
                    window.location.href = '/mo-dashboard.html';
                } else {
                    alert("Dashboard not found for role: " + role);
                }
            } else {
                alert("Error: " + result.message);
            }
        } catch (err) {
            console.error("Login Error:", err);
            alert("Server se connect nahi ho pa raha!");
        }
    });
</script>
</body>
</html>
